# CI/CD pipeline for support-api.
# Trigger:
# on: every push to main
# on: every PR targeting main

name: support-api

on: # trigger
    push: 
        branches: [main]
        paths:
            - "support-api/**"
            - ".github/workflows/support-api.yaml"
    pull_request: 
        branches: [main]
        paths:
            - "support-api/**"
            - ".github/workflows/support-api.yaml"
    workflow_dispatch: # manual

# allow us to cancel older runs of the same branch when a new commit lands and launches a build
concurrency:
    group: support-api-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_PASSWORD: test
                ports:
                    - 5432:5432
                options:
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 10
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python 3.12
              uses: actions/setup-python@v5
              with:
                python-version: 3.12
                cache: pip

            - name: Install support-api with dev deps
              working-directory: support-api
              run: |
                python -m pip install --upgrade pip
                pip install -e .[dev]

            - name: Run pytest against the Postgres service container
              working-directory: support-api
              env:
                TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres
              run: pytest -q
    
    build:
        needs: test
        runs-on: ubuntu-latest
        outputs:
            image_tag: ${{ steps.tag.outputs.image_tag }}
        steps:
            - uses: actions/checkout@v4

            - name: Compute image tag (short git SHA)
              id: tag
              run: echo "image_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT" # this is going to produce the short commit id for us to use for our releases

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            
            - name: Build (no push)
              working-directory: support-api
              run: |
                docker build -f docker/Dockerfile -t support-api:${{ steps.tag.outputs.image_tag }} .

    push:
        needs: build
        runs-on: ubuntu-latest # if we pushed on main only
        if: github.event_name == 'push' && github.ref == 'ref/heads/main' 
        steps:
            - uses: actions/checkout@v4

            - name: Azure login
              uses: azure/login@v2
              with:
                creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: ACR login
              run: az acr login --name ${{ secrets.ACR_NAME }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push
              working-directory: support-api
              run: |
                IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
                REPO="${{ secrets.ACR_NAME }}.azurecr.io/support-api"
                docker buildx build -f docker/Dockerfile -t "${REPO}:${IMAGE_TAG}" -t "${REPO}:latest" --push .
    
    deploy:
        needs: [build, push]
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'ref/heads/main' 
        steps:
            - uses: actions/checkout@v4

            - name: Azure login
              uses: azure/login@v2
              with:
                creds: ${{ secrets.AZURE_CREDENTIALS }}
            
            - name: Set kubectl context to the AKS cluster
              uses: azure/aks-set-context@v3
              with:
                resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
                cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

            - name: Set up Helm
              uses: azure/setup-helm@v4
              with:
                version: v3.14.4

            - name: helm upgrade --install
              run: |
                IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
                REPO="${{ secrets.ACR_NAME }}.azurecr.io/support-api"
                helm upgrade --install support-api ./support-api/helm \
                --namespace default \
                --set image.repository="${REPO}" \
                --set image.tag="${IMAGE_TAG}" \
                --set database.secret.name=support-api-db \
                --set database.secret.key=url \
                --wait --timeout 5m


        
        