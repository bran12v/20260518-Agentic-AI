services:
  db:
    image: pgvector/pgvector:pg16
    environment: # one-time boot creds
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support_dev
      POSTGRES_DB: support
    ports:
      - "5433:5432"
    volumes:
      - support_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s # waiting time before starting the check

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "5000:5000"

    environment:
      LOG_LEVEL: info
      LOG_JSON: 1
      DATABASE_URL: postgresql://support:support_dev@db:5432/support
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION}

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:5000/ready').raise_for_status()"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

    command: >
      sh -c "
        python -m support_api.scripts.bootstrap &&
        gunicorn --bind 0.0.0.0:5000 --workers 2 --access-logfile - --error-logfile - 'support_api.api:create_app()'
      "

volumes:
  support_pgdata: