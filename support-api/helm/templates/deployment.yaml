apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ .Release.Name }}
    labels:
        app.kubernetes.io/name: support-api
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}

# template/blueprint of our deployment (how our architecture is set up)

spec: # deployment spec - kubectl apply -f deployment.yaml
    replicas: {{ .Values.replicaCount }}
    selector:
        matchLabels:
            app.kubernetes.io/name: support-api
            app.kubernetes.io/instance: {{ .Release.Name }}
    template:
        metadata:
            labels:
                app.kubernetes.io/name: support-api
                app.kubernetes.io/instance: {{ .Release.Name }}
        spec: # spec for the individual pods
            {{- if .Values.serviceAccountName }}
            serviceAccountName: {{ .Values.serviceAccountName }}
            {{- end }}
            securityContext:
                {{- toYaml .Values.podSecurityContext | nindent 16 }}
            initContainers: # this runs before main section "containers"
                - name: db-bootstrap
                  image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}" # acrsupportapidevbvanek.azurecr.io/support-api:0.2.0
                  imagePullPolicy: {{ .Values.image.pullPolicy }}
                  command:
                    - python
                    - -c
                    - |
                        from support_api.storage import connect, init_db, seed_from_json
                        init_db()
                        with connect() as conn, conn.cursor() as cur:
                            cur.execute("SELECT count(*) AS n FROM tickets")
                            n = cur.fetchone()["n"]
                        if n == 0:
                            seed_from_json(
                                customers_json="/app/data/customers.json",
                                tickets_json="/app/data/tickets.json",
                            )
                            print("seeded fresh")
                        else:
                            print(f"skipped seed; {n} rows already present")
                  env:
                    {{- if .Values.database.secret.name }}
                    - name: DATABASE_URL
                      valueFrom:
                        secretKeyRef:
                            name: {{ .Values.database.secret.name }}
                            key: {{ .Values.database.secret.key }}
                    {{- else if .Values.database.url}}
                    - name: DATABASE_URL
                      value: {{ .Values.database.url | quote}}
                    {{- end }}
            containers: # main containers
                - name: support-api
                  image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}" # acrsupportapidevbvanek.azurecr.io/support-api:0.2.0
                  imagePullPolicy: {{ .Values.image.pullPolicy }}
                  ports:
                    - name: http
                      containerPort: {{ .Values.service.targetPort }}
                      protocol: TCP
                  env:
                    - name: PORT
                      value: {{ .Values.service.targetPort | quote }}
                    {{- if .Values.database.secret.name }}
                    - name: DATABASE_URL
                      valueFrom:
                        secretKeyRef:
                            name: {{ .Values.database.secret.name }}
                            key: {{ .Values.database.secret.key }}
                    {{- else if .Values.database.url}}
                    - name: DATABASE_URL
                      value: {{ .Values.database.url | quote}}
                    {{- end }}
                  # live and ready
                  livenessProbe:
                    httpGet:
                        path: {{ .Values.probes.liveness.path }}
                        port: http # 80
                    initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
                    periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
                  readinessProbe:
                    httpGet:
                        path: {{ .Values.probes.readiness.path }}
                        port: http
                    initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
                    periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
                  resources:
                    {{- toYaml .Values.resources | nindent 20 }}