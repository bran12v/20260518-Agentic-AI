{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1 # Allows for public external communication
kind: Ingress
metadata:
    name: {{ .Release.Name }}
    labels:
        app.kubernetes.io/name: support-api
        app.kubernetes.io/instance: {{ .Release.Name }}
spec: # instructions for the Ingress
    ingressClassName: {{ .Values.ingress.className }}
    {{- if .Values.ingress.tls.enabled }}
    tls:
        - hosts:
            - {{ .Values.ingress.host | quote }}
          secretName: {{ .Values.ingress.tls.secretName }}
    {{- end }}
    rules:
        - host: {{ .Values.ingress.host | quote }}
          http:
            path:
                - path: /
                  pathType: prefix
                  backend:
                    service:
                        name: {{ .Release.Name }}
                        port:
                            number: {{ .Values.service.port }}
{{- end }}
